

<!--
  EXPLICACIÓN DE ESTA VISTA
  Formulario privado para el jefe.
  Permite crear empleados con email corporativo @fullmx.es.
  El envío lo controla JavaScript y el PHP guarda la contraseña con hash.
-->
<!-- Sección principal de la vista: agrupa título, contenido y zona dinámica. -->
<section class="section" aria-labelledby="crear-empleado-title">
    <div class="section-head">
        <div>
            <span class="eyebrow">Administración</span>
            <h1 id="crear-empleado-title" class="section-title">Crear empleado</h1>
            <p class="section-subtitle">Solo se admiten emails terminados en @fullmx.es.</p>
        </div>
    </div>

    <!-- Formulario de esta vista: JavaScript recoge sus datos y llama al PHP correspondiente. -->

    <form id="formCrearEmpleado" class="form-card" autocomplete="off">
        <div class="form-grid">
            <div class="form-field"><label>Nombre completo</label><input name="nombre" required></div>
            <div class="form-field"><label>DNI</label><input name="dni" maxlength="9" required></div>
            <div class="form-field"><label>Email corporativo</label><input type="email" name="email" placeholder="empleado@fullmx.es" required></div>
            <div class="form-field"><label>Fecha de nacimiento</label><input type="date" name="fecha_nacimiento"></div>
            <div class="form-field"><label>Teléfono</label><input type="number" name="telefono"></div>
            <div class="form-field"><label>Contraseña</label><input type="password" name="password" required></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Crear empleado</button></div>
        <p id="msgCrearEmpleado" class="message" role="status"></p>
    </form>
</section>
