

<!--
  EXPLICACIÓN DE ESTA VISTA
  Registro de clientes desde zona jefe.
  Solo lo puede abrir el jefe para crear clientes manualmente.
-->
<!-- Sección principal de la vista: agrupa título, contenido y zona dinámica. -->
<section class="section" aria-labelledby="registro-cliente-jefe-title">
    <div class="section-head">
        <div>
            <span class="eyebrow">Administración</span>
            <h1 id="registro-cliente-jefe-title" class="section-title">Registrar cliente</h1>
            <p class="section-subtitle">Alta de cliente realizada desde la cuenta jefe.</p>
        </div>
    </div>

    <!-- Formulario de esta vista: JavaScript recoge sus datos y llama al PHP correspondiente. -->

    <form id="formRegistroClienteJefe" class="form-card" autocomplete="off">
        <div class="form-grid">
            <div class="form-field"><label>Nombre completo</label><input name="nombre" required></div>
            <div class="form-field"><label>DNI</label><input name="dni" maxlength="9" required></div>
            <div class="form-field"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-field"><label>Teléfono</label><input type="number" name="telefono" required></div>
            <div class="form-field"><label>Ciudad</label><input name="ciudad" required></div>
            <div class="form-field"><label>Código postal</label><input type="number" name="codigo_postal" required></div>
            <div class="form-field full"><label>Dirección</label><input name="direccion" required></div>
            <div class="form-field full"><label>Contraseña</label><input type="password" name="password" required></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Registrar cliente</button></div>
        <p id="msgRegistroClienteJefe" class="message" role="status"></p>
    </form>
</section>
